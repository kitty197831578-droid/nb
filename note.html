<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>我的成长错题本</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,PingFang SC,Microsoft YaHei,sans-serif;background:#f5f0eb;color:#333;line-height:1.7}
.header{background:linear-gradient(135deg,#8b7e74,#a8a09a);color:#fff;padding:18px 20px 14px;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px}.header .sub{font-size:12px;opacity:.7;margin-top:2px}
.nav{display:flex;gap:6px;margin-top:12px}
.nav button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 16px;border-radius:18px;font-size:13px;cursor:pointer}
.nav button.active{background:#fff;color:#5a4f46;font-weight:600}
.main{max-width:800px;margin:0 auto;padding:20px 16px 60px}
.page{display:none}.page.active{display:block}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{border-radius:10px;padding:16px 10px;text-align:center;border:1px solid #ede8e0}
.stat-card:nth-child(1){background:#e8f4f0;color:#3a8b7a}
.stat-card:nth-child(2){background:#f0eaf8;color:#7c5fa0}
.stat-card:nth-child(3){background:#fef6e6;color:#b8862a}
.stat-num{font-size:30px;font-weight:700}.stat-label{font-size:12px;margin-top:2px;opacity:.8}
.recent-box{background:#fff;border-radius:10px;border:1px solid #ede8e0;overflow:hidden}
.recent-title{padding:14px 16px;font-size:14px;font-weight:600;color:#5a4f46;border-bottom:1px solid #f0ebe4}
.entry-item{padding:12px 16px;border-bottom:1px solid #f0ebe4;cursor:pointer}
.entry-item:last-child{border-bottom:none}.entry-item:active{background:#f5f0eb}
.entry-meta{font-size:11px;color:#999;display:flex;gap:8px;margin-bottom:2px}
.entry-title{font-size:14px;font-weight:500}.entry-preview{font-size:12px;color:#888;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-date{font-size:10px;color:#bbb;margin-top:2px}
.cat-tag{display:inline-block;padding:1px 8px;border-radius:9px;font-size:10px;font-weight:500}
.ct-t{background:#e8f4f0;color:#3a8b7a}.ct-m{background:#f0eaf8;color:#7c5fa0}.ct-p{background:#fef6e6;color:#b8862a}
.empty{padding:50px 20px;text-align:center;color:#bbb}.empty .icon{font-size:40px}.empty p{font-size:14px;margin-top:6px}
.form{padding:20px;background:#fff;border-radius:10px;border:1px solid #ede8e0}
.form h2{font-size:15px;font-weight:600;color:#5a4f46;margin-bottom:14px}
.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:500;color:#5a4f46;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:14px;background:#fefcf9}
.field textarea{min-height:64px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:480px){.row2{grid-template-columns:1fr}}
.btn{background:#8b7e74;color:#fff;border:none;padding:10px 0;border-radius:8px;font-size:14px;cursor:pointer;width:100%;font-weight:500}
.btn:disabled{opacity:.5}.btn-sec{background:#f0ebe4;color:#5a4f46;border:none;padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer}
.btn-del{background:#f5e6e4;color:#b55a4a;border:none;padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer}
.bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.bar select,.bar input{padding:6px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;background:#fff}
.bar input{flex:1;min-width:100px}
.detail-box{padding:20px;background:#fff;border-radius:10px;border:1px solid #ede8e0}
.detail-box h2{font-size:17px;font-weight:600;margin-bottom:4px}
.detail-meta{font-size:12px;color:#888;margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap}
.detail-sec{margin-top:12px}
.detail-sec h3{font-size:13px;font-weight:600;color:#5a4f46;margin-bottom:3px;padding-left:8px;border-left:3px solid #bfb6ad}
.detail-sec p{font-size:13px;line-height:1.8;white-space:pre-wrap}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
.tags span{background:#f0ebe4;padding:2px 8px;border-radius:8px;font-size:11px;color:#5a4f46}
.actions{margin-top:16px;display:flex;gap:8px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(40,40,40,.9);color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;z-index:999;pointer-events:none;opacity:0;transition:.35s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
<h1>📓 我的成长错题本</h1>
<div class="sub">把每一天的经历变成经验</div>
<div class="nav" id="navBar"></div>
</div>
<div class="main">
<div class="page active" id="pageDashboard"><div class="stats" id="statsBox"></div><div class="recent-box"><div class="recent-title">最近记录</div><div id="recentList"></div></div></div>
<div class="page" id="pageAdd">
<div class="form">
<h2>✏️ 记录一条新反思</h2>
<div class="field"><label>标题 *</label><input id="t" placeholder="例如：今天《纳米技术》那节课的遗憾"></div>
<div class="row2"><div class="field"><label>分类</label><select id="c"><option value="教学反思">🍎 教学反思</option><option value="班级管理">📋 班级管理</option><option value="个人成长">🌱 个人成长</option></select></div>
<div class="field"><label>标签（逗号分隔）</label><input id="tags" placeholder="如：课堂互动,三年级"></div></div>
<div class="field"><label>📌 情境/问题</label><textarea id="s" rows="3" placeholder="当时发生了什么？"></textarea></div>
<div class="field"><label>💡 我的反思</label><textarea id="r" rows="3" placeholder="为什么需要改进？"></textarea></div>
<div class="field"><label>🛠️ 改进方案</label><textarea id="i" rows="2" placeholder="下次我会怎么做？"></textarea></div>
<div class="field"><label>🔁 后续追踪（可选）</label><textarea id="f" rows="2" placeholder="后来试了吗？"></textarea></div>
<button class="btn" id="saveBtn" onclick="save()">💾 保存记录</button>
</div></div>
<div class="page" id="pageList">
<div class="bar"><select id="filterCat" onchange="renderList()"><option value="">全部分类</option><option value="教学反思">🍎 教学反思</option><option value="班级管理">📋 班级管理</option><option value="个人成长">🌱 个人成长</option></select>
<input id="searchQ" placeholder="搜索…" oninput="renderList()"><button class="btn-sec" onclick="exportCsv()">📥 导出</button></div>
<div id="listBox"></div></div>
<div class="page" id="pageDetail"><div class="detail-box" id="detailBox"></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const KEY='growthEntries'; let entries=[];
function load(){try{entries=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){entries=[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(entries))}

const pages=['dashboard','add','list','detail'];
const pageLabels=['📊 总览','✏️ 记录','📖 浏览'];
const navBar=document.getElementById('navBar');
pageLabels.forEach((label,i)=>{const b=document.createElement('button');b.textContent=label;b.onclick=()=>switchPage(pages[i]);if(i===0)b.className='active';navBar.appendChild(b)})

function switchPage(name){document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));const idx=pages.indexOf(name);if(idx>=0)document.querySelectorAll('.nav button')[idx].classList.add('active');document.getElementById('page'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('active');if(name==='dashboard')renderDash();if(name==='list')renderList()}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderDash(){load();const counts={'教学反思':0,'班级管理':0,'个人成长':0};entries.forEach(e=>{if(counts[e.cat]!==undefined)counts[e.cat]++});document.getElementById('statsBox').innerHTML=[{l:'教学反思',n:counts['教学反思'],cl:'#3a8b7a'},{l:'班级管理',n:counts['班级管理'],cl:'#7c5fa0'},{l:'个人成长',n:counts['个人成长'],cl:'#b8862a'}].map(s=>'<div class="stat-card"><div class="stat-num" style="color:'+s.cl+'">'+s.n+'</div><div class="stat-label">'+s.l+'</div></div>').join('');const recent=entries.slice(0,10);document.getElementById('recentList').innerHTML=recent.length?recent.map(e=>cardHtml(e)).join(''):'<div class="empty"><div class="icon">📝</div><p>还没有记录，去写第一条吧！</p></div>'}

function cardHtml(e){const cls=e.cat==='教学反思'?'ct-t':e.cat==='班级管理'?'ct-m':'ct-p';const d=new Date(e.date);const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const prev=(e.sit||e.ref||'').slice(0,60);return'<div class="entry-item" onclick="viewEntry('+e.id+')"><div class="entry-meta"><span class="cat-tag '+cls+'">'+esc(e.cat)+'</span><span class="entry-date">'+ds+'</span></div><div class="entry-title">'+esc(e.title||'无标题')+'</div><div class="entry-preview">'+esc(prev)+(prev.length>=60?'…':'')+'</div></div>'}

function save(){const title=document.getElementById('t').value.trim();if(!title){toast('请填写标题');return}const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='保存中…';load();const entry={id:Date.now()+'_'+Math.random().toString(36).slice(2,6),title,cat:document.getElementById('c').value,tags:document.getElementById('tags').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean),sit:document.getElementById('s').value.trim(),ref:document.getElementById('r').value.trim(),imp:document.getElementById('i').value.trim(),fol:document.getElementById('f').value.trim(),date:new Date().toISOString()};entries.unshift(entry);save();['t','tags','s','r','i','f'].forEach(id=>document.getElementById(id).value='');toast('✅ 已保存');switchPage('dashboard');btn.disabled=false;btn.textContent='💾 保存记录'}

function renderList(){load();const cat=document.getElementById('filterCat').value;const q=document.getElementById('searchQ').value.trim().toLowerCase();let filtered=entries;if(cat)filtered=filtered.filter(e=>e.cat===cat);if(q)filtered=filtered.filter(e=>(e.title||'').toLowerCase().includes(q)||(e.sit||'').toLowerCase().includes(q)||(e.ref||'').toLowerCase().includes(q)||(e.tags||[]).some(t=>t.toLowerCase().includes(q)));const box=document.getElementById('listBox');if(!filtered.length){box.innerHTML='<div class="empty"><div class="icon">🔍</div><p>没有记录</p></div>';return}box.innerHTML='<div class="recent-box">'+filtered.map(e=>cardHtml(e)).join('')+'</div>'}

function viewEntry(id){load();const e=entries.find(x=>x.id===id);if(!e){toast('记录不存在');return}const cls=e.cat==='教学反思'?'ct-t':e.cat==='班级管理'?'ct-m':'ct-p';const d=new Date(e.date);const ds=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';const tagsHtml=(e.tags&&e.tags.length)?'<div class="tags">'+e.tags.map(t=>'<span>#'+esc(t)+'</span>').join('')+'</div>':'';let sec='';if(e.sit)sec+='<div class="detail-sec"><h3>📌 情境/问题</h3><p>'+esc(e.sit)+'</p></div>';if(e.ref)sec+='<div class="detail-sec"><h3>💡 我的反思</h3><p>'+esc(e.ref)+'</p></div>';if(e.imp)sec+='<div class="detail-sec"><h3>🛠️ 改进方案</h3><p>'+esc(e.imp)+'</p></div>';if(e.fol)sec+='<div class="detail-sec"><h3>🔁 后续追踪</h3><p>'+esc(e.fol)+'</p></div>';document.getElementById('detailBox').innerHTML='<button class="btn-sec" onclick="switchPage(\'list\')">← 返回</button><h2>'+esc(e.title)+'</h2><div class="detail-meta"><span class="cat-tag '+cls+'">'+esc(e.cat)+'</span><span>'+ds+'</span></div>'+tagsHtml+sec+'<div class="actions"><button class="btn-del" onclick="deleteEntry(\''+e.id+'\')">🗑️ 删除</button></div>';switchPage('detail')}

function deleteEntry(id){if(!confirm('确定删除？'))return;load();entries=entries.filter(e=>e.id!==id);save();toast('已删除');switchPage('list')}

function exportCsv(){load();if(!entries.length){toast('暂无数据');return}const rows=[['日期','分类','标题','标签','情境/问题','反思','改进方案','后续追踪']];entries.forEach(e=>{const d=new Date(e.date);rows.push([d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'),e.cat,e.title,(e.tags||[]).join('; '),e.sit,e.ref,e.imp,e.fol])});const csv=rows.map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='错题本_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);toast('📥 导出成功')}

renderDash();
</script>
</body>
</html>
