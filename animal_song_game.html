<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>动物儿歌 · 生字读音闯关</title><style>  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }  body {    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;    min-height: 100vh; min-height: 100dvh;    background: linear-gradient(180deg, #e8f5e9 0%, #fff8e1 40%, #fce4ec 100%);    display: flex; align-items: center; justify-content: center;    overflow-x: hidden; overflow-y: auto; position: relative;  }  .deco { position: fixed; font-size: 1.6rem; pointer-events: none; opacity: 0.35; z-index: 0; animation: floatDeco 12s ease-in-out infinite; }  .deco:nth-child(1) { top: 8%; left: 5%; animation-delay: 0s; }  .deco:nth-child(2) { top: 15%; right: 8%; animation-delay: -2s; font-size: 2rem; }  .deco:nth-child(3) { bottom: 20%; left: 3%; animation-delay: -4s; }  .deco:nth-child(4) { bottom: 12%; right: 5%; animation-delay: -6s; font-size: 2rem; }  .deco:nth-child(5) { top: 40%; left: 2%; animation-delay: -8s; font-size: 1.2rem; }  .deco:nth-child(6) { top: 35%; right: 3%; animation-delay: -10s; font-size: 1.4rem; }  .deco:nth-child(7) { top: 60%; right: 10%; animation-delay: -3s; font-size: 1.8rem; }  .deco:nth-child(8) { bottom: 35%; left: 8%; animation-delay: -7s; }  @keyframes floatDeco {    0%, 100% { transform: translateY(0) rotate(0deg); }    33% { transform: translateY(-18px) rotate(5deg); }    66% { transform: translateY(8px) rotate(-3deg); }  }  .container {    position: relative; z-index: 1;    width: 100%; max-width: 520px; min-height: auto;    margin: 10px; padding: 24px 20px 28px;    background: rgba(255,255,255,0.88);    backdrop-filter: blur(12px);    border-radius: 32px;    box-shadow: 0 12px 48px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);    display: flex; flex-direction: column; align-items: center; overflow-y: auto; -webkit-overflow-scrolling: touch; max-height: 92dvh; transition: opacity .35s ease;  }  .screen { display: none; width: 100%; flex-direction: column; align-items: center; gap: 14px; animation: fadeUp .4s ease; }  .screen.active { display: flex; }  @keyframes fadeUp { 0% { opacity: 0; transform: translateY(18px); } 100% { opacity: 1; transform: translateY(0); } }  .welcome-emoji { font-size: 3.4rem; margin-bottom: 4px; animation: bounceEmoji 2s ease-in-out infinite; }  @keyframes bounceEmoji { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }  .welcome-title { font-size: 2.2rem; font-weight: 800; color: #2e7d32; letter-spacing: 2px; text-align: center; }  .welcome-sub { font-size: 1.1rem; color: #558b2f; margin-bottom: 4px; }  .poem-box {    background: #f1f8e9; border-radius: 16px; padding: 14px 16px; margin: 4px 0 8px;    font-size: 1rem; line-height: 1.9; color: #33691e; width: 100%;    text-align: center;  }  .poem-box .highlight { color: #c62828; font-weight: 700; }  .poem-box small { display: block; margin-top: 6px; font-size: .82rem; color: #827717; }  .btn-primary {    display: inline-block; padding: 14px 48px; margin-top: 6px;    background: linear-gradient(135deg, #66bb6a, #43a047); color: #fff;    border: none; border-radius: 40px; font-size: 1.25rem; font-weight: 700;    cursor: pointer; letter-spacing: 2px;    box-shadow: 0 4px 16px rgba(67,160,71,0.35);    transition: transform .15s, box-shadow .15s;  }  .btn-primary:hover { transform: scale(1.04); box-shadow: 0 6px 24px rgba(67,160,71,0.45); }  .btn-primary:active { transform: scale(.97); }  .game-header {    display: flex; justify-content: space-between; align-items: center;    width: 100%; margin-bottom: 4px;  }  .game-header .level-tag {    background: #e8f5e9; padding: 4px 14px; border-radius: 20px;    font-size: .85rem; font-weight: 700; color: #2e7d32;  }  .game-header .score-display {    font-size: 1rem; font-weight: 700; color: #f57f17;  }  .game-header .score-display span { font-size: 1.2rem; }  .progress-wrap { width: 100%; height: 8px; background: #e0e0e0; border-radius: 8px; overflow: hidden; margin-bottom: 4px; }  .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #66bb6a, #43a047); border-radius: 8px; transition: width .5s ease; }  .progress-label { font-size: .78rem; color: #757575; align-self: flex-start; margin-bottom: 2px; }  .char-area { text-align: center; margin: 6px 0; position: relative; width: 100%; }  .char-main {    font-size: 7rem; line-height: 1.2; font-weight: 700;    color: #1b5e20; transition: transform .3s ease;    cursor: default; user-select: none;  }  .char-main.bounce-in { animation: charBounce .5s cubic-bezier(.34,1.56,.64,1); }  @keyframes charBounce { 0% { transform: scale(0.2); opacity: 0; } 80% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }  .char-main.shake { animation: shake .4s ease; }  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }  .char-main.correct-pop { animation: correctPop .5s ease; color: #2e7d32; }  @keyframes correctPop { 0%{transform:scale(1)} 40%{transform:scale(1.25)} 100%{transform:scale(1)} }  .char-speaker {    position: absolute; right: 4px; top: 4px;    background: #fff; border: 2px solid #a5d6a7; border-radius: 50%;    width: 42px; height: 42px; font-size: 1.3rem; cursor: pointer;    display: flex; align-items: center; justify-content: center;    transition: background .2s; color: #388e3c;  }  .char-speaker:hover { background: #e8f5e9; }  .char-speaker:active { transform: scale(.92); }  .options-grid {    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 6px 0;  }  .option-btn {    padding: 14px 8px; font-size: 1.2rem; font-weight: 600;    background: #fff; border: 2.5px solid #c8e6c9; border-radius: 16px;    cursor: pointer; transition: all .15s; color: #1b5e20;    text-align: center; -webkit-tap-highlight-color: transparent;  }  .option-btn:hover { border-color: #81c784; background: #f1f8e9; }  .option-btn:active { transform: scale(.96); }  .option-btn.disabled { pointer-events: none; opacity: .6; }  .option-btn.correct { background: #c8e6c9; border-color: #43a047; color: #1b5e20; }  .option-btn.wrong { background: #ffcdd2; border-color: #e53935; color: #b71c1c; }  .feedback { font-size: 1.15rem; font-weight: 700; min-height: 2.2rem; text-align: center; padding: 4px 0; }  .feedback.correct { color: #2e7d32; }  .feedback.wrong { color: #c62828; }    .level-complete-title { font-size: 1.6rem; font-weight: 800; color: #2e7d32; }  .stars-row { font-size: 2.4rem; letter-spacing: 6px; }  .stars-row .star-empty { opacity: .2; filter: grayscale(1); }  .level-score-text { font-size: 1.1rem; color: #555; }  .btn-secondary {    padding: 12px 40px; margin-top: 4px;    background: linear-gradient(135deg, #ffca28, #ffb300); color: #3e2723;    border: none; border-radius: 36px; font-size: 1.15rem; font-weight: 700;    cursor: pointer; letter-spacing: 1px;    box-shadow: 0 4px 14px rgba(255,179,0,0.35);    transition: transform .15s, box-shadow .15s;  }  .btn-secondary:hover { transform: scale(1.04); box-shadow: 0 6px 22px rgba(255,179,0,0.45); }  .btn-secondary:active { transform: scale(.97); }  .victory-title { font-size: 2rem; font-weight: 800; color: #e65100; }  .victory-emoji { font-size: 3.6rem; }  .victory-stats { width: 100%; margin: 4px 0; }  .victory-level-row { display: flex; justify-content: space-between; padding: 8px 12px; border-radius: 12px; background: #f5f5f5; margin-bottom: 6px; align-items: center; }  .victory-level-row .v-name { font-weight: 600; color: #333; }  .victory-level-row .v-stars { font-size: 1.1rem; }  .victory-level-row .v-score { font-weight: 700; color: #f57f17; }  .total-score-big { font-size: 1.5rem; font-weight: 800; color: #e65100; margin: 6px 0; }  .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }  .confetti-piece {    position: absolute; top: -20px; width: 10px; height: 10px; opacity: .85;    animation: confettiFall linear forwards;  }  @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }  @media (max-width: 480px) {    .container { margin: 8px; padding: 18px 14px 22px; border-radius: 24px; min-height: auto; }    .char-main { font-size: 5rem; }    .welcome-title { font-size: 1.8rem; }    .option-btn { padding: 12px 6px; font-size: 1.05rem; }    .options-grid { gap: 8px; }    .btn-primary { padding: 12px 36px; font-size: 1.1rem; }    .btn-secondary { padding: 10px 32px; font-size: 1.05rem; }  }</style></head><body><div class="deco">🦋</div><div class="deco">🐝</div><div class="deco">🐞</div><div class="deco">🐛</div><div class="deco">🌸</div><div class="deco">🌿</div><div class="deco">🌻</div><div class="deco">🍃</div><div class="container" id="app"><div class="screen active" id="welcomeScreen"><div class="welcome-emoji">🐝</div><div class="welcome-title">动物儿歌</div><div class="welcome-sub">和生字宝宝做游戏 🎯</div><div class="poem-box">蜻蜓半空展翅飞，<br>蝴蝶<span class="highlight">花</span>间<span class="highlight">捉</span><span class="highlight">迷</span><span class="highlight">藏</span>。<br>蚯蚓土里<span class="highlight">造</span>宫殿，<br><span class="highlight">蚂</span><span class="highlight">蚁</span>地上<span class="highlight">运</span><span class="highlight">食</span><span class="highlight">粮</span>。<br>蝌蚪<span class="highlight">池</span>中游得<span class="highlight">欢</span>，<br><span class="highlight">蜘</span><span class="highlight">蛛</span>房前结<span class="highlight">网</span>忙。<br><small>✦ 红色生字是今天要认的宝宝 ✦</small><div style="margin-top:10px;padding-top:10px;border-top:1px dashed #c8e6c9;text-align:left;font-size:.9rem;color:#33691e;line-height:1.8;"><div style="font-weight:700;text-align:center;margin-bottom:4px;">🎮 怎么玩？</div>• 每关有 6 个生字宝宝等你来认～<br>• 每个字有 4 个读音，选出正确的那一个！<br>• 第一次猜对得 <strong>10 分</strong> 🌟 第二次猜对得 <strong>5 分</strong> 👍<br>• 两次都没猜对也没关系，看看正确答案，下次加油 💪<br>• 全部通关看你能拿到几颗 <strong>⭐</strong> 哟！</div></div><button class="btn-primary" onclick="startGame()">开始闯关 🎮</button></div><div class="screen" id="gameScreen"><div class="game-header"><span class="level-tag" id="levelTag">第一关</span><div class="score-display">⭐ <span id="scoreDisplay">0</span></div></div><div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div><div class="progress-label" id="progressLabel">1 / 6</div><div class="char-area"><div class="char-main" id="charMain">蜻</div><button class="char-speaker" id="speakerBtn" onclick="speakChar()" title="听读音">🔊</button></div><div class="options-grid" id="optionsGrid"></div><div class="feedback" id="feedbackEl"></div></div><div class="screen" id="levelCompleteScreen"><div class="level-complete-title" id="lcTitle">🎉 闯关成功！</div><div class="stars-row" id="lcStars">⭐⭐⭐</div><div class="level-score-text" id="lcScore">本关得分：100 分</div><div style="font-size:2rem;margin:2px 0;" id="lcEmoji">🐞</div><button class="btn-secondary" id="lcBtn" onclick="nextLevel()">下一关 ➡️</button></div><div class="screen" id="victoryScreen"><div class="victory-emoji">🏆</div><div class="victory-title">全部通关！</div><div class="total-score-big" id="victoryTotalScore">总分：180</div><div class="victory-stats" id="victoryStats"></div><button class="btn-primary" onclick="resetGame()" style="margin-top:8px;">再玩一次 🔄</button></div></div><div class="confetti-container" id="confettiContainer"></div><script>const LEVELS = [  {    name: '\u866b\u866b\u4e16\u754c', emoji: '\ud83d\udc1b',    chars: [      { char: '\u873b', pinyin: 'q\u012bng', opts: ['q\u012bng','q\u012bn','x\u012bng','q\u00edng'] },      { char: '\u8713', pinyin: 't\u00edng', opts: ['t\u00edng','t\u00edn','t\u01d0ng','d\u01d0ng'] },      { char: '\u8682', pinyin: 'm\u01ce', opts: ['m\u01ce','m\u00e0','m\u0101','m\u00e1'] },      { char: '\u8681', pinyin: 'y\u01d0', opts: ['y\u01d0','y\u00ed','y\u00ec','y\u012b'] },      { char: '\u8718', pinyin: 'zh\u012b', opts: ['zh\u012b','z\u012b','zh\u00ed','j\u012b'] },      { char: '\u86db', pinyin: 'zh\u016b', opts: ['zh\u016b','z\u016b','zh\u00fa','zh\u014du'] },    ]  },  {    name: '\u52a8\u4f5c\u4e50\u56ed', emoji: '\ud83c\udfc3',    chars: [      { char: '\u6349', pinyin: 'zhu\u014d', opts: ['zhu\u014d','zu\u014d','zhu\u00f3','zh\u014du'] },      { char: '\u8ff7', pinyin: 'm\u00ed', opts: ['m\u00ed','m\u01d0','n\u00ed','m\u00ec'] },      { char: '\u85cf', pinyin: 'c\u00e1ng', opts: ['c\u00e1ng','z\u00e0ng','ch\u00e1ng','c\u00e0n'] },      { char: '\u9020', pinyin: 'z\u00e0o', opts: ['z\u00e0o','zh\u00e0o','z\u0101o','c\u00e0o'] },      { char: '\u8fd0', pinyin: 'y\u00f9n', opts: ['y\u00f9n','y\u00fan','y\u016bn','y\u00f2ng'] },      { char: '\u6b22', pinyin: 'hu\u0101n', opts: ['hu\u0101n','hu\u00e0n','hu\u01cen','hu\u0101'] },    ]  },  {    name: '\u81ea\u7136\u5929\u5730', emoji: '\ud83c\udf3f',    chars: [      { char: '\u98df', pinyin: 'sh\u00ed', opts: ['sh\u00ed','s\u00ed','sh\u00ec','s\u00ec'] },      { char: '\u7cae', pinyin: 'li\u00e1ng', opts: ['li\u00e1ng','li\u00e1n','ni\u00e1ng','li\u01ceng'] },      { char: '\u7f51', pinyin: 'w\u01ceng', opts: ['w\u01ceng','w\u01cen','w\u00e1ng','w\u00e0ng'] },      { char: '\u95f4', pinyin: 'ji\u0101n', opts: ['ji\u0101n','ji\u00e0n','ji\u01cen','ji\u0101ng'] },      { char: '\u6c60', pinyin: 'ch\u00ed', opts: ['ch\u00ed','c\u00ed','ch\u01d0','ch\u012b'] },      { char: '\u7269', pinyin: 'w\u00f9', opts: ['w\u00f9','w\u00fa','w\u016b','w\u01d4'] },    ]  }];</script><script>let state = { currentLevel: 0, currentIdx: 0, score: 0, levelScore: 0, attempts: 0, answered: false, canAnswer: true, levelResults: [] };const FEEDBACK_OK1 = ['\u592a\u68d2\u4e86\uff01\u2728', '\u771f\u5389\u5bb3\uff01\ud83c\udf89', '\u975e\u5e38\u597d\uff01\ud83d\udc4f', '\u7b54\u5bf9\u5566\uff01\ud83c\udf8a', '\u4f60\u5f88\u68d2\uff01\ud83d\udc96'];const FEEDBACK_OK2 = ['\u5bf9\u4e86\uff01\u270d\ufe0f', '\u4e0d\u9519\u54e6\uff01\ud83d\ude0a', '\u52a0\u6cb9\uff01\ud83d\udcaa', '\u597d\uff01\u270c\ufe0f'];const FEEDBACK_NO = ['\u518d\u60f3\u60f3\u54e6\ud83d\ude0a', '\u4e0d\u5bf9\u54e6', '\u6362\u4e00\u4e2a\u8bd5\u8bd5\ud83d\udcaa'];let audioCtx = null;function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }function playNote(f,d,t){try{const c=getAudioCtx(),o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start(c.currentTime);o.stop(c.currentTime+d)}catch(e){}}function playCorrect(){playNote(523,.12);setTimeout(()=>playNote(659,.18),100)}function playWrong(){playNote(330,.25,'square')}function playStar(){playNote(587,.1);setTimeout(()=>playNote(784,.15),80);setTimeout(()=>playNote(1047,.25),180)}function speakChar() {  if (!window.speechSynthesis) return;  const ch = LEVELS[state.currentLevel].chars[state.currentIdx];  const u = new SpeechSynthesisUtterance(ch.char);  u.lang='zh-CN';u.rate=0.72;u.pitch=1.05;  window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);}function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}function startGame(){state.currentLevel=0;state.currentIdx=0;state.score=0;state.levelScore=0;state.attempts=0;state.answered=false;state.canAnswer=true;state.levelResults=[];showScreen('gameScreen');renderQuestion()}function renderQuestion(){  const lv=LEVELS[state.currentLevel],ch=lv.chars[state.currentIdx];  document.getElementById('levelTag').textContent='\u7b2c'+(state.currentLevel+1)+'\u5173\u00b7'+lv.name;  document.getElementById('scoreDisplay').textContent=state.score;  document.getElementById('progressLabel').textContent=(state.currentIdx+1)+' / '+lv.chars.length;  document.getElementById('progressBar').style.width=(state.currentIdx/lv.chars.length*100)+'%';  const el=document.getElementById('charMain');el.textContent=ch.char;el.className='char-main bounce-in';  state.attempts=0;state.answered=false;state.canAnswer=true;  document.getElementById('feedbackEl').textContent='';document.getElementById('feedbackEl').className='feedback';  document.getElementById('speakerBtn').style.display='';  const g=document.getElementById('optionsGrid');g.innerHTML='';  const idxs=[0,1,2,3];shuffle(idxs);  idxs.forEach(i=>{const b=document.createElement('button');b.className='option-btn';b.textContent=ch.opts[i];b.dataset.idx=i;b.addEventListener('click',()=>handleAnswer(b,i));g.appendChild(b)});  if(window.speechSynthesis)setTimeout(speakChar,500);}function handleAnswer(btn,ci){  if(!state.canAnswer||state.answered)return;  const lv=LEVELS[state.currentLevel],ch=lv.chars[state.currentIdx],all=document.querySelectorAll('.option-btn');  if(ci===0){    state.answered=true;state.canAnswer=false;    btn.classList.add('correct');all.forEach(b=>{if(b!==btn)b.classList.add('disabled')});    playCorrect();document.getElementById('speakerBtn').style.display='none';    const fb=document.getElementById('feedbackEl');    if(state.attempts===0){state.score+=10;state.levelScore+=10;fb.textContent=FEEDBACK_OK1[Math.floor(Math.random()*FEEDBACK_OK1.length)];fb.className='feedback correct'}    else{state.score+=5;state.levelScore+=5;fb.textContent=FEEDBACK_OK2[Math.floor(Math.random()*FEEDBACK_OK2.length)];fb.className='feedback correct'}    document.getElementById('scoreDisplay').textContent=state.score;    document.getElementById('charMain').className='char-main correct-pop';    setTimeout(()=>advance(),1200);  } else {    state.attempts++;btn.classList.add('wrong');    const fb=document.getElementById('feedbackEl');    if(state.attempts>=2){      state.answered=true;state.canAnswer=false;playWrong();      all.forEach(b=>b.classList.add('disabled'));document.getElementById('speakerBtn').style.display='none';      all[0].classList.add('correct');      fb.textContent='\u6b63\u786e\u7b54\u6848\u662f '+ch.opts[0]+'\uff0c\u52a0\u6cb9\u54e6\ud83d\udcaa';fb.className='feedback wrong';      document.getElementById('charMain').className='char-main shake';      setTimeout(()=>{document.getElementById('charMain').className='char-main';advance()},1800);    } else {      playWrong();btn.classList.add('disabled');fb.textContent=FEEDBACK_NO[Math.floor(Math.random()*FEEDBACK_NO.length)];fb.className='feedback wrong';      document.getElementById('charMain').className='char-main shake';      setTimeout(()=>{document.getElementById('charMain').className='char-main'},400);    }  }}function advance(){  const lv=LEVELS[state.currentLevel];state.currentIdx++;  if(state.currentIdx>=lv.chars.length)showLevelComplete();else renderQuestion();}function showLevelComplete(){  const lv=LEVELS[state.currentLevel];const max=lv.chars.length*10;const r=state.levelScore/max;  let stars=r>=.9?3:r>=.6?2:1;  state.levelResults.push({levelName:lv.name,score:state.levelScore,stars});  document.getElementById('lcTitle').textContent='\ud83c\udf89 '+lv.name+' \u901a\u5173\uff01';  const ss='\u2b50'.repeat(stars)+'<span class="star-empty">'+'\u2b50'.repeat(3-stars)+'</span>';  document.getElementById('lcStars').innerHTML=ss;  document.getElementById('lcScore').textContent='\u672c\u5173\u5f97\u5206\uff1a'+state.levelScore+' \u5206';  document.getElementById('lcEmoji').textContent=lv.emoji;  const last=state.currentLevel>=LEVELS.length-1;  const b=document.getElementById('lcBtn');b.textContent=last?'\u67e5\u770b\u6210\u7ee9 \ud83c\udfc6':'\u4e0b\u4e00\u5173 \u27a1\ufe0f';b.disabled=false;  if(stars===3)playStar();  showScreen('levelCompleteScreen');}function nextLevel(){  state.currentLevel++;  if(state.currentLevel>=LEVELS.length){showVictory();return}  state.currentIdx=0;state.levelScore=0;state.attempts=0;state.answered=false;state.canAnswer=true;  showScreen('gameScreen');renderQuestion();}function showVictory(){  document.getElementById('victoryTotalScore').textContent='\u603b\u5206\uff1a'+state.score+' \u5206';  const c=document.getElementById('victoryStats');c.innerHTML='';  state.levelResults.forEach(r=>{    const d=document.createElement('div');d.className='victory-level-row';    let hs='';for(let i=0;i<3;i++)hs+=i<r.stars?'\u2b50':'<span class="star-empty">\u2b50</span>';    d.innerHTML='<span class="v-name">'+r.levelName+'</span><span class="v-stars">'+hs+'</span><span class="v-score">'+r.score+'\u5206</span>';c.appendChild(d);  });  showScreen('victoryScreen');launchConfetti();}function resetGame(){document.getElementById('confettiContainer').innerHTML='';showScreen('welcomeScreen')}function launchConfetti(){  const c=document.getElementById('confettiContainer');c.innerHTML='';  const cl=['#f44336','#e91e63','#9c27b0','#3f51b5','#03a9f4','#009688','#8bc34a','#ffeb3b','#ff9800','#ff5722'];  const sh=['\u25a0','\u25cf','\u25b2','\u2605','\u25c6'];  for(let i=0;i<80;i++){    const e=document.createElement('div');e.className='confetti-piece';    e.textContent=sh[Math.floor(Math.random()*sh.length)];    e.style.left=Math.random()*100+'%';e.style.color=cl[Math.floor(Math.random()*cl.length)];    e.style.fontSize=(8+Math.random()*14)+'px';e.style.animationDuration=(2+Math.random()*3)+'s';    e.style.animationDelay=(Math.random()*2)+'s';e.style.transform='rotate('+(Math.random()*360)+'deg)';    c.appendChild(e);  }  setTimeout(()=>{c.innerHTML=''},6000);}document.addEventListener('keydown',(e)=>{  if(e.key==='Enter'){    if(document.getElementById('welcomeScreen').classList.contains('active')){startGame();return}    if(document.getElementById('levelCompleteScreen').classList.contains('active')){nextLevel();return}    if(document.getElementById('victoryScreen').classList.contains('active')){resetGame()}
